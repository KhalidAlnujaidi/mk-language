name: ci

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync environment
        # --all-extras installs the daemon (fastapi/uvicorn/httpx/psutil) and
        # dashboard (rich) optional deps the broker + dashboard tests/types need.
        run: uv sync --all-extras

      # --- Hard gates: a red mark here blocks the merge. ---------------------

      - name: Lint (ruff)
        run: uv run ruff check .

      # Type-check the pristine core as a HARD gate. These packages are at zero
      # pyright errors and MUST stay there — this is the ratchet's locked rung.
      # As products/tests reach zero (see the informational step below), promote
      # them into this list so the clean set only ever grows.
      - name: Type-check core (pyright · gated)
        run: uv run pyright kernel daemon adapters evals kx

      - name: Test (pytest, incl. kernel-purity architecture guardrail)
        run: uv run pytest

      # --- Visibility: the remaining type debt, surfaced but non-blocking. ---

      # products/tests still carry ~300 pre-existing strict-mode errors. We
      # print them on every run so the debt is visible and reviewers can see it
      # shrink, but they don't wall every PR. Pay down a package, get it to
      # zero, then move it up into the gated step above and delete it here.
      - name: Type-check rest (pyright · informational)
        continue-on-error: true
        run: uv run pyright products tests
