name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync environment
        # --all-extras installs the daemon (fastapi/uvicorn/httpx/psutil) and
        # dashboard (rich) optional deps the broker + dashboard tests/types need.
        run: uv sync --all-extras

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Type-check (pyright)
        run: uv run pyright

      - name: Test (pytest, incl. architecture guardrail)
        run: uv run pytest
